name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW="${{ github.event.inputs.version }}"
            RAW="${RAW#v}"
            TAG="v${RAW}"
          else
            TAG="${GITHUB_REF_NAME}"
            RAW="${TAG#v}"
          fi

          if [[ "${RAW}" == *"-"* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Ensure Tag Exists (manual run)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Publish BetterStore.Contract
        run: |
          dotnet restore BetterStore.Contract/BetterStore.Contract.csproj
          dotnet publish BetterStore.Contract/BetterStore.Contract.csproj -c Release --nologo --no-restore

      - name: Publish BetterStore
        run: |
          dotnet restore BetterStore/BetterStore.csproj
          dotnet publish BetterStore/BetterStore.csproj -c Release --nologo --no-restore

      - name: Copy Contract DLL to exports
        shell: bash
        run: |
          PUBLISH_DIR="BetterStore/build/publish/BetterStore"
          EXPORTS_DIR="${PUBLISH_DIR}/resources/exports"
          mkdir -p "${EXPORTS_DIR}"

          CONTRACT_DLL=$(find BetterStore.Contract/bin/Release -name "BetterStore.Contract.dll" -type f | head -n 1)
          if [[ -z "${CONTRACT_DLL}" ]]; then
            CONTRACT_DLL=$(find BetterStore.Contract/obj/Release -name "BetterStore.Contract.dll" -type f | head -n 1)
          fi

          if [[ -n "${CONTRACT_DLL}" ]]; then
            cp "${CONTRACT_DLL}" "${EXPORTS_DIR}/"
            echo "Copied BetterStore.Contract.dll to exports"
          else
            echo "WARNING: BetterStore.Contract.dll not found"
          fi

      - name: Zip BetterStore
        shell: bash
        run: |
          cd BetterStore/build/publish
          zip -r ../../../BetterStore.zip BetterStore/

      - name: Publish and Zip Modules
        shell: bash
        run: |
          shopt -s nullglob
          MODULES=(BetterModules/*//*.csproj)

          for PROJECT in "${MODULES[@]}"; do
            MODULE_DIR="$(dirname "${PROJECT}")"
            MODULE_NAME="$(basename "${MODULE_DIR}")"
            echo "=== Publishing ${MODULE_NAME} ==="

            dotnet restore "${PROJECT}"
            dotnet publish "${PROJECT}" -c Release --nologo --no-restore

            PUBLISH_DIR="${MODULE_DIR}/build/publish/${MODULE_NAME}"
            if [[ -d "${PUBLISH_DIR}" ]]; then
              (cd "${MODULE_DIR}/build/publish" && zip -r "../../../${MODULE_NAME}.zip" "${MODULE_NAME}/")
              mv "${MODULE_DIR}/${MODULE_NAME}.zip" "./${MODULE_NAME}.zip" 2>/dev/null || true
              echo "Created ${MODULE_NAME}.zip"
            else
              echo "WARNING: Publish directory not found for ${MODULE_NAME}"
            fi
          done

      - name: Generate Release Notes
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          if [[ "${PRERELEASE}" == "true" ]]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -n 1 || true)
          else
            PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -n 1 || true)
          fi

          {
            echo "## BetterStore v${VERSION}"
            echo
            if [[ -n "${PREV_TAG}" ]]; then
              echo "_Compared to ${PREV_TAG}_"
              echo
              RANGE="${PREV_TAG}..${TAG}"
            else
              echo "_First release_"
              echo
              RANGE="${TAG}"
            fi
            COMMITS=$(git log "${RANGE}" --pretty=format:'- %s ([`%h`](https://github.com/${{ github.repository }}/commit/%H))')
            if [[ -z "${COMMITS}" ]]; then
              echo "- No commit details found."
            else
              echo "${COMMITS}"
            fi
          } > release_notes.md

      - name: Collect Release Assets
        id: assets
        shell: bash
        run: |
          FILES="BetterStore.zip"
          for ZIP in Roulette.zip Wage.zip Blackjack.zip; do
            if [[ -f "${ZIP}" ]]; then
              FILES="${FILES}\n${ZIP}"
            fi
          done
          echo -e "${FILES}" > asset_list.txt
          cat asset_list.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BetterStore v${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          body_path: release_notes.md
          files: |
            BetterStore.zip
            Roulette.zip
            Wage.zip
            Blackjack.zip
